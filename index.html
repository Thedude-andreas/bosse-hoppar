<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majkens spelhala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260314-2">
</head>
<body>
  <main class="app">
    <section class="hud">
      <div>
        <p class="eyebrow">Webbspel</p>
        <h1>Majkens spelhala</h1>
      </div>
      <div class="scoreboard">
        <div class="score-card">
          <span>Spel</span>
          <strong id="level-label">Valj</strong>
        </div>
        <div class="score-card">
          <span>Poäng</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>Bästa</span>
          <strong id="best-score">0</strong>
        </div>
      </div>
    </section>

    <section class="game-shell">
      <canvas id="game" width="960" height="420" aria-label="Spelplan för Bosse Hoppar"></canvas>

      <div class="overlay" id="start-overlay">
        <div class="panel">
          <h2>Valj spel</h2>
          <p>Bosse Hoppar ar ett hoppspel med elefanter, Sigge och morotter.</p>
          <p>Bosse Vimsar ar ett eget labyrintspel dar Bosse letar moroten och undviker elefanter.</p>
          <div class="button-row">
            <button id="runner-button" type="button">Bosse Hoppar</button>
            <button id="maze-button" type="button">Bosse Vimsar</button>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="game-over-overlay">
        <div class="panel">
          <h2>Oj! Bosse snubblade.</h2>
          <p id="final-score">Du fick 0 poäng.</p>
          <div class="button-row">
            <button id="restart-button" type="button">Spela igen</button>
            <button id="menu-button" type="button">Till spelval</button>
          </div>
        </div>
      </div>
    </section>

    <section class="touch-controls" aria-label="Mobila spelkontroller">
      <div class="touch-pad">
        <button class="touch-button touch-dir" data-dir="ArrowUp" type="button">Upp</button>
        <div class="touch-row">
          <button class="touch-button touch-dir" data-dir="ArrowLeft" type="button">Vänster</button>
          <button class="touch-button touch-dir" data-dir="ArrowDown" type="button">Ner</button>
          <button class="touch-button touch-dir" data-dir="ArrowRight" type="button">Höger</button>
        </div>
      </div>
      <button class="touch-button touch-action" id="jump-button" type="button">Hoppa</button>
    </section>
  </main>

  <script src="script.js?v=20260314-2"></script>
</body>
</html>
