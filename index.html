<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Majkens spelhåla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260314-11">
</head>
<body>
  <main class="app">
    <section class="hud">
      <div>
        <p class="eyebrow">Webbspel</p>
        <h1>Majkens spelhåla</h1>
      </div>
      <div class="scoreboard">
        <div class="score-card">
          <span>Spel</span>
          <strong id="level-label">Välj</strong>
        </div>
        <div class="score-card">
          <span>Poäng</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>Bästa</span>
          <strong id="best-score">0</strong>
        </div>
      </div>
    </section>

    <section class="game-shell" id="game-shell">
      <canvas id="game" width="960" height="420" aria-label="Spelplan för Bosse Hoppar"></canvas>

      <div class="overlay" id="start-overlay">
        <div class="panel">
          <h2>Välj spel</h2>
          <p>Bosse Hoppar är ett hoppspel med elefanter, Sigge och morötter.</p>
          <p>Bosse Vimsar är ett eget labyrintspel där Bosse letar moroten och undviker elefanter.</p>
          <div class="button-row">
            <button id="runner-button" type="button">Bosse Hoppar</button>
            <button id="maze-button" type="button">Bosse Vimsar</button>
          </div>
        </div>
      </div>

      <div class="overlay hidden" id="game-over-overlay">
        <div class="panel">
          <h2>Oj! Bosse snubblade.</h2>
          <p id="final-score">Du fick 0 poäng.</p>
          <div class="button-row">
            <button id="restart-button" type="button">Spela igen</button>
            <button id="menu-button" type="button">Till spelval</button>
          </div>
        </div>
      </div>
    </section>

    <section class="mobile-ui" aria-label="Mobila spelkontroller">
      <div class="joystick hidden" id="joystick" aria-hidden="true">
        <div class="joystick-base" id="joystick-base">
          <div class="joystick-knob" id="joystick-knob"></div>
        </div>
        <p class="joystick-label">Styr Bosse Vimsar med höger tumme</p>
      </div>
    </section>
  </main>

  <script src="script.js?v=20260314-11"></script>
</body>
</html>
